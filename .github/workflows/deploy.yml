name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ott-curation-app
  GCP_REGION: asia-northeast3
  IMAGE: asia-northeast3-docker.pkg.dev/ott-curation-app/ott-curation/api

jobs:
  # ─────────────────────────────────────────
  # 1. TypeScript Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: ESLint 실행
        run: npm run lint

  # ─────────────────────────────────────────
  # 2. Cloud Run 서버 배포
  # ─────────────────────────────────────────
  deploy-server:
    name: Deploy Server (Cloud Run)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: GCP 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud 설정
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Docker 인증 (Artifact Registry)
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Docker 이미지 빌드
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./server

      - name: Artifact Registry에 Push
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Cloud Run 배포
        run: |
          gcloud run deploy ott-curation-api \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --service-account ott-curation-sa@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --add-cloudsql-instances ${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:ott-curation-db \
            --set-secrets="DB_PASSWORD=db-password:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,VOYAGE_API_KEY=voyage-api-key:latest,TMDB_API_KEY=tmdb-api-key:latest,API_SECRET_KEY=api-secret-key:latest" \
            --set-env-vars="NODE_ENV=production,PORT=8080,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }},DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }},CLOUD_SQL_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }},GCS_VIDEO_BUCKET=ott-curation-ai-videos,GCS_THUMBNAIL_BUCKET=ott-curation-thumbnails,GCS_AVATAR_BUCKET=ott-curation-avatars,FIREBASE_PROJECT_ID=${{ env.GCP_PROJECT_ID }}" \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60 \
            --quiet

  # ─────────────────────────────────────────
  # 3. DB 마이그레이션
  # ─────────────────────────────────────────
  run-migrations:
    name: DB Migration
    runs-on: ubuntu-latest
    needs: deploy-server

    steps:
      - uses: actions/checkout@v4

      - name: GCP 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud 설정
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: PostgreSQL 클라이언트 설치
        run: sudo apt-get install -y postgresql-client

      - name: Cloud SQL Auth Proxy 설치
        run: |
          curl -fsSL https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64 \
            -o cloud-sql-proxy
          chmod +x cloud-sql-proxy

      - name: 마이그레이션 실행
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          CLOUD_SQL_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
        run: bash scripts/run-migrations.sh

  # ─────────────────────────────────────────
  # 4. Flutter Android 빌드
  # ─────────────────────────────────────────
  build-android:
    name: Build Flutter (Android)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        working-directory: flutter_app
        run: flutter pub get

      - name: 코드 생성 (build_runner)
        working-directory: flutter_app
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: APK 빌드 (release)
        working-directory: flutter_app
        run: flutter build apk --release

      - name: APK 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # 5. Flutter iOS 빌드
  # ─────────────────────────────────────────
  build-ios:
    name: Build Flutter (iOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        working-directory: flutter_app
        run: flutter pub get

      - name: 코드 생성 (build_runner)
        working-directory: flutter_app
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: iOS 빌드 (no-codesign)
        working-directory: flutter_app
        run: flutter build ios --release --no-codesign

      - name: IPA 패키징
        run: |
          mkdir -p Payload
          cp -r flutter_app/build/ios/iphoneos/Runner.app Payload/
          zip -r ios-release-${{ github.sha }}.ipa Payload

      - name: IPA 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: ios-release-${{ github.sha }}.ipa
          retention-days: 30
